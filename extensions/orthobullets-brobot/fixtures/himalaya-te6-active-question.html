<!doctype html>
<html>
<head><title>Himalaya Assessment Engine</title></head>
<body class="accsap collapsed with-top-nav default-skin">
<!-- Faithful mirror of the te6 partial-question.html live-question DOM. Sanitized synthetic content. -->
<div class="container-fluid">
  <main id="main-content">
    <div id="teApp" class="quiz">
      <div class="widget exam-question multiple-choice ng-scope">
        <div class="question-header">
          <div class="question-number ng-binding">Question 2 of 10</div>
          <div class="question-info-right">
            <div class="question-id ng-binding ng-hide"></div>
          </div>
        </div>
        <div class="question">
          <div class="questionStem ng-binding">A synthetic patient presents for a sanitized hip arthroscopy scenario. Which synthetic portal placement is safest?</div>
        </div>
        <div class="choices midsize">
          <ul>
            <li class="paper-shadow in ng-scope">
              <div class="result-marker ng-hide"></div>
              <input type="radio" name="answer-set" class="choice" id="ans-9001" value="9001">
              <label for="ans-9001" class="ng-binding">Anterolateral synthetic portal under direct visualization</label>
            </li>
            <li class="paper-shadow in ng-scope active">
              <div class="result-marker ng-hide"></div>
              <input type="radio" name="answer-set" class="choice" id="ans-9002" value="9002" checked>
              <label for="ans-9002" class="ng-binding">A percutaneous synthetic approach without imaging</label>
            </li>
            <li class="paper-shadow in ng-scope">
              <div class="result-marker ng-hide"></div>
              <input type="radio" name="answer-set" class="choice" id="ans-9003" value="9003">
              <label for="ans-9003" class="ng-binding">Posterior synthetic portal near the sciatic notch</label>
            </li>
            <li class="paper-shadow in ng-scope">
              <div class="result-marker ng-hide"></div>
              <input type="radio" name="answer-set" class="choice" id="ans-9004" value="9004">
              <label for="ans-9004" class="ng-binding">Medial synthetic portal through adductor musculature</label>
            </li>
          </ul>
        </div>
        <div class="exam-submit-answer">
          <button class="btn btn-primary">Submit</button>
        </div>
        <a class="btn btn-success pull-right next-question">Next</a>
      </div>
    </div>
  </main>
</div>
</body>
</html>
