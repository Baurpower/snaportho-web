    <section class="question">
      <div class="question__text">
        A 79-year-old woman sustains a reverse obliquity intertrochanteric fracture after a fall.
        Which fixation strategy is most appropriate?
      </div>

      <div class="question__images">
        <div
          class="question__image"
          alt="https://www.orthobullets.com/currenttest-image-210999.jpg"
          style="background-image: url('https://www.orthobullets.com/currenttest-image-210999.jpg');"
          width="800"
          height="600"
        ></div>
      </div>

      <div class="answers">
        <div class="answerItem">
          <div class="answerNumber">A</div>
          <div class="answerDescription"><div class="answerText">Sliding hip screw</div></div>
        </div>
        <div class="answerItem">
          <div class="answerNumber">B</div>
          <div class="answerDescription"><div class="answerText">Cephalomedullary nail</div></div>
        </div>
        <div class="answerItem">
          <div class="answerNumber">C</div>
          <div class="answerDescription"><div class="answerText">Percutaneous cannulated screws</div></div>
        </div>
        <div class="answerItem">
          <div class="answerNumber">D</div>
          <div class="answerDescription"><div class="answerText">Long leg cast immobilization</div></div>
        </div>
      </div>
