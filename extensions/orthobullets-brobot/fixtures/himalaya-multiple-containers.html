<!doctype html>
<html>
  <head><title>Synthetic Himalaya Multiple Containers</title></head>
  <body>
    <main>
      <section class="question-attempt" style="display:none" data-question-id="HIM-HIDDEN">
        <div class="stem">Hidden stale question should not be extracted.</div>
        <div class="answers">
          <div class="answer"><span class="answer-index">A</span><span class="answer-text">Hidden A</span></div>
          <div class="answer"><span class="answer-index">B</span><span class="answer-text">Hidden B</span></div>
        </div>
      </section>
      <section class="question-attempt expanded active" data-question-id="HIM-SYN-003">
        <div class="stem">Question 3. The visible active container asks a sanitized switching question.</div>
        <div class="answers">
          <div class="answer your-answer incorrect"><span class="answer-index">A</span><span class="answer-text">First visible choice</span></div>
          <div class="answer correct"><span class="answer-index">B</span><span class="answer-text">Second visible choice</span></div>
        </div>
        <div class="feedback">Feedback: The second visible choice is supported.</div>
      </section>
    </main>
  </body>
</html>
